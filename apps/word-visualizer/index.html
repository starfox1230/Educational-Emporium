<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Word Visualizer</title>
  <style>
    :root {
      --bg: #f7f2ff;
      --bg2: #fff7fb;
      --panel: rgba(255, 255, 255, 0.88);
      --text: #271f2f;
      --muted: #6c6172;
      --accent: #d84893;
      --accent2: #7b61ff;
      --border: rgba(39, 31, 47, 0.14);
      --shadow: 0 24px 80px rgba(52, 38, 72, 0.18);
      --button: #ffffff;
      --buttonText: #271f2f;
      --displaySize: clamp(4.5rem, 18vw, 18rem);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body[data-theme="night"] {
      --bg: #090b13;
      --bg2: #171424;
      --panel: rgba(22, 24, 37, 0.92);
      --text: #f7f3ff;
      --muted: #b8aec9;
      --accent: #93c5fd;
      --accent2: #f0abfc;
      --border: rgba(255, 255, 255, 0.16);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      --button: rgba(255, 255, 255, 0.08);
      --buttonText: #f7f3ff;
    }

    body[data-theme="bright"] {
      --bg: #f7fbff;
      --bg2: #fffbe8;
      --panel: rgba(255, 255, 255, 0.9);
      --text: #102033;
      --muted: #57677b;
      --accent: #1683d8;
      --accent2: #f4b000;
      --border: rgba(16, 32, 51, 0.14);
      --shadow: 0 24px 80px rgba(18, 75, 126, 0.16);
    }

    body[data-theme="blush"] {
      --bg: #fff1f7;
      --bg2: #f9e6ff;
      --text: #3d1730;
      --muted: #805f73;
      --accent: #e83f91;
      --accent2: #ba5cff;
      --shadow: 0 24px 80px rgba(211, 61, 145, 0.2);
    }

    body[data-theme="rose"] {
      --bg: #fff7fa;
      --bg2: #ffe4ec;
      --text: #371923;
      --muted: #7e5b65;
      --accent: #c92f65;
      --accent2: #ff8fb3;
      --shadow: 0 24px 80px rgba(190, 47, 97, 0.18);
    }

    body[data-theme="strawberry"] {
      --bg: #fff2f2;
      --bg2: #ffe9f5;
      --text: #411d2a;
      --muted: #805f68;
      --accent: #e53657;
      --accent2: #ff78bc;
      --shadow: 0 24px 80px rgba(224, 52, 87, 0.18);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }
    body {
      color: var(--text);
      background:
        radial-gradient(circle at 18% 20%, color-mix(in srgb, var(--accent2) 18%, transparent), transparent 34%),
        radial-gradient(circle at 82% 72%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 32%),
        linear-gradient(135deg, var(--bg), var(--bg2));
      overflow: hidden;
    }

    button, input, select {
      font: inherit;
    }

    .app {
      min-height: 100dvh;
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 44px;
      position: relative;
      z-index: 5;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: var(--muted);
      font-size: clamp(0.85rem, 2vw, 1rem);
      font-weight: 700;
    }

    .counter {
      white-space: nowrap;
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 999px;
      padding: 8px 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .icon-btn svg { width: 21px; height: 21px; }

    .stage {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: clamp(10px, 2vw, 28px);
    }

    .word-shell {
      width: min(96vw, 1180px);
      min-height: min(58dvh, 580px);
      border: 1px solid var(--border);
      border-radius: 8px;
      background: linear-gradient(145deg, color-mix(in srgb, var(--panel) 92%, white), var(--panel));
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      padding: clamp(22px, 6vw, 80px);
      position: relative;
      overflow: hidden;
    }

    .word-shell::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent);
      border-radius: 8px;
      pointer-events: none;
    }

    .word {
      position: relative;
      z-index: 1;
      font-size: var(--displaySize);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: 0;
      text-align: center;
      max-width: 100%;
      overflow-wrap: anywhere;
      text-wrap: balance;
      text-shadow: 0 8px 28px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    .empty {
      max-width: 620px;
      text-align: center;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.5;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
    }

    .bottombar {
      display: flex;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      font-size: clamp(0.76rem, 2vw, 0.95rem);
      text-align: center;
      flex-wrap: wrap;
      font-weight: 700;
    }

    .key {
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2px 7px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
    }

    .drawer {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.42);
      display: none;
      justify-content: flex-end;
      z-index: 20;
      backdrop-filter: blur(6px);
    }

    .drawer.open { display: flex; }

    .settings {
      width: min(440px, 100vw);
      height: 100%;
      background: var(--panel);
      color: var(--text);
      border-left: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: auto;
      padding: 18px;
    }

    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 1.25rem; }
    h2 {
      font-size: 0.88rem;
      text-transform: uppercase;
      color: var(--muted);
      margin: 18px 0 8px;
      letter-spacing: 0.04em;
    }

    .segmented, .theme-grid, .level-list, .word-grid {
      display: grid;
      gap: 8px;
    }

    .segmented {
      grid-template-columns: 1fr 1fr;
      background: color-mix(in srgb, var(--button) 80%, transparent);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
    }

    .segmented button,
    .theme-btn,
    .level-row button,
    .utility-btn {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--button);
      color: var(--buttonText);
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 800;
    }

    button.active {
      background: var(--accent);
      color: white;
      border-color: transparent;
    }

    .theme-grid { grid-template-columns: 1fr 1fr; }
    .theme-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      justify-content: flex-start;
    }

    .swatch {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 0 1px var(--border);
      flex: 0 0 auto;
    }

    .swatch.night { background: linear-gradient(135deg, #090b13, #93c5fd); }
    .swatch.bright { background: linear-gradient(135deg, #f7fbff, #f4b000); }
    .swatch.blush { background: linear-gradient(135deg, #fff1f7, #e83f91); }
    .swatch.rose { background: linear-gradient(135deg, #fff7fa, #c92f65); }
    .swatch.strawberry { background: linear-gradient(135deg, #fff2f2, #e53657); }

    .level-row {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: color-mix(in srgb, var(--button) 78%, transparent);
      padding: 8px;
      display: grid;
      gap: 8px;
    }

    .level-main {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 8px;
    }

    label.check {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      min-width: 0;
    }

    .check input, .word-item input {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
    }

    .count {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .word-grid {
      grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
      max-height: 220px;
      overflow: auto;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }

    .word-grid[hidden] { display: none; }

    .word-item {
      display: flex;
      align-items: center;
      gap: 7px;
      background: color-mix(in srgb, var(--button) 72%, transparent);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      font-weight: 750;
      overflow: hidden;
    }

    .word-item span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tools {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .utility-btn.full { grid-column: 1 / -1; }

    @media (max-width: 700px) {
      .app { gap: 8px; }
      .word-shell {
        width: 100%;
        min-height: 62dvh;
      }
      .settings {
        width: 100vw;
      }
      .brand span:last-child { display: none; }
      .counter { font-size: 0.82rem; }
      .theme-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

    let history = [];
    let randomBag = [];

    const wordDisplay = document.getElementById("wordDisplay");
    const emptyState = document.getElementById("emptyState");
    const counter = document.getElementById("counter");
    const drawer = document.getElementById("drawer");
    const themeGrid = document.getElementById("themeGrid");
    const orderGroup = document.getElementById("orderGroup");
    const levelList = document.getElementById("levelList");

    function loadSettings() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORE));
        return {
          theme: parsed?.theme || "blush",
          order: parsed?.order || "inOrder",
          selection: normalizeSelection(parsed?.selection),
          wordSelections: normalizeWordSelections(parsed?.wordSelections)
        };
      } catch {
        return { theme: "blush", order: "inOrder", selection: structuredClone(defaultSelection), wordSelections: {} };
      }
    }

    function normalizeSelection(selection) {
      const next = structuredClone(defaultSelection);
      for (const listKey of Object.keys(next)) {
        for (const levelKey of Object.keys(next[listKey])) {
          if (typeof selection?.[listKey]?.[levelKey] === "boolean") next[listKey][levelKey] = selection[listKey][levelKey];
        }
      }
      return next;
    }

    function normalizeWordSelections(wordSelections) {
      const next = {};
      for (const listKey of Object.keys(WORD_BANK)) {
        next[listKey] = {};
        for (const levelKey of Object.keys(WORD_BANK[listKey])) {
          const words = WORD_BANK[listKey][levelKey];
          const incoming = wordSelections?.[listKey]?.[levelKey];
          next[listKey][levelKey] = Array.isArray(incoming)
            ? incoming.filter(word => words.includes(word))
            : [...words];
        }
      }
      return next;
    }

    function save() {
      localStorage.setItem(STORE, JSON.stringify(settings));
    }

    function uniqueWords(words) {
      const seen = new Set();
      return words.filter(word => {
        const key = word.toLocaleLowerCase();
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function rebuildActiveWords(keepWord) {
      const words = [];
      for (const listKey of Object.keys(WORD_BANK)) {
        for (const levelKey of Object.keys(WORD_BANK[listKey])) {
          if (!settings.selection[listKey]?.[levelKey]) continue;
          words.push(...settings.wordSelections[listKey][levelKey]);
        }
      }
      activeWords = uniqueWords(words);
      if (settings.order === "random") {
        randomBag = shuffle(activeWords.map((_, i) => i));
        index = randomBag.shift() ?? 0;
      } else {
        const existingIndex = activeWords.findIndex(word => word === keepWord);
        index = existingIndex >= 0 ? existingIndex : Math.min(index, Math.max(activeWords.length - 1, 0));
      }
      history = [];
      renderWord();
      renderLevels();
    }

    function shuffle(items) {
      const next = [...items];
      for (let i = next.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [next[i], next[j]] = [next[j], next[i]];
      }
      return next;
    }

    function nextWord() {
      if (!activeWords.length) return;
      history.push(index);
      if (settings.order === "random") {
        if (!randomBag.length) randomBag = shuffle(activeWords.map((_, i) => i).filter(i => activeWords.length < 2 || i !== index));
        index = randomBag.shift() ?? index;
      } else {
        index = (index + 1) % activeWords.length;
      }
      renderWord();
    }

    function previousWord() {
      if (!activeWords.length) return;
      if (history.length) index = history.pop();
      else index = (index - 1 + activeWords.length) % activeWords.length;
      renderWord();
    }

    function renderWord() {
      const hasWords = activeWords.length > 0;
      wordDisplay.hidden = !hasWords;
      emptyState.hidden = hasWords;
      wordDisplay.textContent = hasWords ? activeWords[index] : "";
      counter.textContent = hasWords ? `${index + 1} / ${activeWords.length}` : "0 / 0";
      fitWord();
    }

    function fitWord() {
      if (!activeWords.length) return;
      document.documentElement.style.setProperty("--displaySize", "clamp(4.5rem, 18vw, 18rem)");
      wordDisplay.style.fontSize = "";
      requestAnimationFrame(() => {
        const shell = document.querySelector(".word-shell");
        const maxWidth = shell.clientWidth * 0.86;
        let size = parseFloat(getComputedStyle(wordDisplay).fontSize);
        while (wordDisplay.scrollWidth > maxWidth && size > 44) {
          size -= 4;
          wordDisplay.style.fontSize = `${size}px`;
        }
      });
    }

    function renderThemes() {
      themeGrid.innerHTML = "";
      THEMES.forEach(([id, label]) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `theme-btn ${settings.theme === id ? "active" : ""}`;
        btn.innerHTML = `<span class="swatch ${id}"></span><span>${label}</span>`;
        btn.addEventListener("click", () => {
          settings.theme = id;
          applySettings();
        });
        themeGrid.appendChild(btn);
      });
    }

    function renderOrder() {
      orderGroup.querySelectorAll("button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.order === settings.order);
        btn.onclick = () => {
          settings.order = btn.dataset.order;
          rebuildActiveWords(activeWords[index]);
          applySettings();
        };
      });
    }

    function renderLevels() {
      levelList.innerHTML = "";
      for (const listKey of ["dolch", "fry"]) {
        const title = document.createElement("h2");
        title.textContent = listKey === "dolch" ? "Dolch Sight Words" : "Fry Sight Words";
        levelList.appendChild(title);
        for (const levelKey of Object.keys(WORD_BANK[listKey])) {
          const words = WORD_BANK[listKey][levelKey];
          const selectedWords = settings.wordSelections[listKey][levelKey];
          const row = document.createElement("div");
          row.className = "level-row";
          row.innerHTML = `
            <div class="level-main">
              <label class="check">
                <input type="checkbox" ${settings.selection[listKey][levelKey] ? "checked" : ""}>
                <span>${listKey === "dolch" ? "Level " : "Fry "}${levelKey}</span>
              </label>
              <span class="count">${selectedWords.length}/${words.length}</span>
              <button type="button">Words</button>
            </div>
            <div class="word-grid" hidden></div>
          `;
          const levelCheckbox = row.querySelector("input");
          const toggleBtn = row.querySelector("button");
          const grid = row.querySelector(".word-grid");
          levelCheckbox.addEventListener("change", () => {
            settings.selection[listKey][levelKey] = levelCheckbox.checked;
            applySettings(true);
          });
          toggleBtn.addEventListener("click", () => {
            grid.hidden = !grid.hidden;
            toggleBtn.textContent = grid.hidden ? "Words" : "Hide";
          });
          words.forEach(word => {
            const item = document.createElement("label");
            item.className = "word-item";
            item.innerHTML = `<input type="checkbox" ${selectedWords.includes(word) ? "checked" : ""}><span title="${word}">${word}</span>`;
            item.querySelector("input").addEventListener("change", event => {
              const set = new Set(settings.wordSelections[listKey][levelKey]);
              if (event.target.checked) set.add(word);
              else set.delete(word);
              settings.wordSelections[listKey][levelKey] = words.filter(w => set.has(w));
              if (settings.wordSelections[listKey][levelKey].length > 0) settings.selection[listKey][levelKey] = true;
              applySettings(true);
            });
            grid.appendChild(item);
          });
          levelList.appendChild(row);
        }
      }
    }

    function applySettings(rebuild = false) {
      document.body.dataset.theme = settings.theme;
      renderThemes();
      renderOrder();
      if (rebuild) rebuildActiveWords(activeWords[index]);
      save();
    }

    document.getElementById("settingsBtn").addEventListener("click", () => {
      drawer.classList.add("open");
      drawer.setAttribute("aria-hidden", "false");
    });
    document.getElementById("closeBtn").addEventListener("click", () => {
      drawer.classList.remove("open");
      drawer.setAttribute("aria-hidden", "true");
    });
    drawer.addEventListener("click", event => {
      if (event.target === drawer) {
        drawer.classList.remove("open");
        drawer.setAttribute("aria-hidden", "true");
      }
    });
    document.getElementById("selectAllBtn").addEventListener("click", () => {
      for (const listKey of Object.keys(settings.selection)) {
        for (const levelKey of Object.keys(settings.selection[listKey])) settings.selection[listKey][levelKey] = true;
      }
      applySettings(true);
    });
    document.getElementById("clearAllBtn").addEventListener("click", () => {
      for (const listKey of Object.keys(settings.selection)) {
        for (const levelKey of Object.keys(settings.selection[listKey])) settings.selection[listKey][levelKey] = false;
      }
      applySettings(true);
    });

    document.addEventListener("keydown", event => {
      if (event.target.matches("input, button, select, textarea")) return;
      if (event.code === "Space") {
        event.preventDefault();
        nextWord();
      }
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z") {
        event.preventDefault();
        previousWord();
      }
      if (event.key === "Escape" && drawer.classList.contains("open")) {
        drawer.classList.remove("open");
        drawer.setAttribute("aria-hidden", "true");
      }
    });
    document.querySelector(".word-shell").addEventListener("click", nextWord);
    window.addEventListener("resize", fitWord);

    applySettings();
    rebuildActiveWords();
  </script>
</body>
</html>
